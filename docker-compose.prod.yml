version: "3.9"

services:
  db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # Force setting this in .env
    command: postgres -c shared_buffers=256MB -c max_connections=200

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD}

  api:
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120 --access-logfile - --error-logfile -"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    command: celery -A config.celery_app worker --loglevel=info --concurrency=4 --max-tasks-per-child=1000
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0

  beat:
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
